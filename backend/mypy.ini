[mypy]
python_version = 3.13
strict = True
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
explicit_package_bases = True
mypy_path = backend

# Enable Pydantic V2 plugin
plugins = pydantic.mypy

# ---------------------------------------------------------
# Third-Party Overrides
# ---------------------------------------------------------
# The supabase-py client and python-dotenv occasionally lack complete strict stubs.
# We ignore missing imports for them to prevent false positive CI failures.
[mypy-supabase.*]
ignore_missing_imports = True

[mypy-dotenv.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-fastapi.middleware.cors.*]
ignore_missing_imports = True

# ---------------------------------------------------------
# Pydantic Strict Settings
# ---------------------------------------------------------
[pydantic-mypy]
init_forbid_extra = True
init_typed = True
warn_required_dynamic_aliases = True
