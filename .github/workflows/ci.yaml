name: FLUX Monorepo CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # --- 1. BACKEND CHECK ---
  backend-ci:
    name: Backend (Ruff, Mypy, Pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: cd backend && uv sync

      - name: Lint with Ruff
        run: cd backend && uv run ruff check .

      - name: Type check with Mypy
        run: cd backend && uv run mypy . --config-file mypy.ini

      - name: Run unit tests with pytest
        run: cd backend && uv run pytest

  # --- 2. FRONTEND CHECK ---
  frontend-ci:
    name: Frontend (ESLint, TSC)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --ignore-scripts

      - name: Lint (ESLint)
        run: cd frontend && npm run lint

      - name: Type Check (TSC)
        run: cd frontend && npm run type-check

  # --- 3. DATABASE CHECK  ---
  supabase-ci:
    name: Supabase (Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Start Supabase Local Stack
        run: supabase start

      - name: Verify SQL Format
        run: supabase db lint

  # --- 4. API CONTRACT CHECK ---
  api-contract-ci:
    name: API Contract Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Backend dependencies
        run: cd backend && uv sync

      - name: Install Frontend dependencies
        run: cd frontend && npm ci --ignore-scripts

      - name: Start FastAPI Backend
        env:
          # Provide dummy vars to satisfy the Supabase client initialization during boot
          SUPABASE_URL: "http://127.0.0.1:54321"
          SUPABASE_KEY: "dummy-key-for-ci"
        run: |
          cd backend
          uv run uvicorn main:app --port 8000 &
          sleep 5 # Allow the server time to bind to the port

      - name: Generate Frontend Types
        run: cd frontend && npm run typegen

      - name: Verify Contract Synchronization
        run: |
          # If this fails, the backend Pydantic models and frontend TS interfaces are out of sync.
          # You must run 'npm run typegen' locally and commit the resulting api.d.ts file.
          git diff --exit-code frontend/types/api.d.ts || (echo "❌ API contract mismatch detected!" && exit 1)
